<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="manifest" href="/manifest.json" />
  <title>Smart Garage</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    h1 { font-size: 1.4rem; letter-spacing: 0.05em; opacity: 0.7; }

    #status-indicator {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      transition: background 0.4s, color 0.4s;
      background: #333;
    }
    #status-indicator.open  { background: #e74c3c; color: #fff; }
    #status-indicator.closed { background: #27ae60; color: #fff; }

    #trigger-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    #trigger-btn {
      width: 200px;
      height: 64px;
      border-radius: 32px;
      border: none;
      background: #4a90e2;
      color: #fff;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    #trigger-btn:active { transform: scale(0.96); }
    #trigger-btn:disabled { opacity: 0.4; cursor: default; }

    #geo-badge {
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      opacity: 0.85;
    }
    #geo-badge .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    #geo-badge.in-range .dot  { background: #27ae60; }
    #geo-badge.out-range .dot { background: #e74c3c; }
    #geo-badge.checking .dot  { background: #f39c12; }
    #geo-badge.hidden-geo { display: none; }

    #error-msg {
      color: #e74c3c;
      font-size: 0.9rem;
      min-height: 1.2em;
      text-align: center;
    }

    /* Token setup screen */
    #setup {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 320px;
    }
    #setup label { font-size: 0.9rem; opacity: 0.7; }
    #setup input {
      padding: 0.75rem 1rem;
      border-radius: 12px;
      border: 1px solid #444;
      background: #2a2a3e;
      color: #eee;
      font-size: 1rem;
      width: 100%;
    }
    #setup button {
      padding: 0.75rem;
      border-radius: 12px;
      border: none;
      background: #4a90e2;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    /* Home location setup */
    #home-setup {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 320px;
    }
    #home-setup h2 { font-size: 1rem; opacity: 0.8; }
    #home-setup p  { font-size: 0.85rem; color: #aaa; line-height: 1.5; }
    #home-setup label { font-size: 0.9rem; opacity: 0.7; }
    #home-setup input {
      padding: 0.75rem 1rem;
      border-radius: 12px;
      border: 1px solid #444;
      background: #2a2a3e;
      color: #eee;
      font-size: 1rem;
      width: 100%;
    }
    #home-setup .btn-row { display: flex; gap: 0.75rem; }
    #home-setup button {
      flex: 1;
      padding: 0.75rem;
      border-radius: 12px;
      border: none;
      background: #4a90e2;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    #home-setup button.secondary {
      background: transparent;
      border: 1px solid #555;
      color: #aaa;
      font-weight: 400;
    }
    #home-saved { font-size: 0.8rem; color: #27ae60; min-height: 1em; }

    .hidden { display: none !important; }

    footer {
      position: fixed;
      bottom: 1rem;
      width: 100%;
      text-align: center;
      font-size: 0.7rem;
      opacity: 0.3;
      letter-spacing: 0.05em;
    }

    #history-section {
      width: 100%;
      max-width: 360px;
      max-height: 260px;
      overflow-y: auto;
      border-top: 1px solid #333;
      padding-top: 1rem;
    }
    #history-section h2 {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      opacity: 0.4;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0;
      border-bottom: 1px solid #2a2a3e;
      font-size: 0.82rem;
      gap: 0.5rem;
    }
    .history-item .h-left { display: flex; align-items: center; gap: 0.25rem; flex-wrap: wrap; }
    .history-item .h-user { color: #7eb8f7; font-weight: 600; }
    .history-item .h-desc { color: #aaa; }
    .history-item .h-state { font-weight: 700; }
    .history-item .h-state.open   { color: #e74c3c; }
    .history-item .h-state.closed { color: #27ae60; }
    .history-item .h-time { opacity: 0.4; font-size: 0.75rem; flex-shrink: 0; white-space: nowrap; }

    /* Confirmation dialog */
    #confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      z-index: 100;
    }
    #confirm-dialog {
      background: #2a2a3e;
      border: 1px solid #e74c3c;
      border-radius: 16px;
      padding: 1.75rem 1.5rem;
      max-width: 320px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      text-align: center;
    }
    #confirm-dialog h2 { font-size: 1.1rem; color: #e74c3c; letter-spacing: 0.05em; }
    #confirm-dialog p  { font-size: 0.9rem; color: #aaa; line-height: 1.5; }
    #confirm-dialog .confirm-btns { display: flex; gap: 0.75rem; }
    #confirm-cancel-btn {
      flex: 1; padding: 0.75rem; border-radius: 10px; border: 1px solid #555;
      background: transparent; color: #eee; font-size: 1rem; cursor: pointer;
    }
    #confirm-close-btn {
      flex: 1; padding: 0.75rem; border-radius: 10px; border: none;
      background: #e74c3c; color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer;
    }

    /* Tesla landscape layout */
    @media (orientation: landscape) and (min-width: 600px) {
      body { justify-content: flex-start; padding: 1.5rem 2rem; gap: 1.25rem; }

      #main {
        display: grid !important;
        grid-template-columns: auto 1fr;
        grid-template-rows: auto auto auto;
        column-gap: 2.5rem;
        row-gap: 1rem;
        align-items: center;
        width: 100%;
        max-width: 700px;
      }
      h1 { grid-column: 1 / -1; }
      #status-indicator { grid-column: 1; grid-row: 2; }
      #trigger-wrap { grid-column: 2; grid-row: 2; align-items: flex-start; }
      #error-msg { grid-column: 2; grid-row: 3; }
      #logout-btn { grid-column: 1 / -1; }
      #history-section {
        grid-column: 1 / -1;
        max-height: 180px;
        font-size: 0.9rem;
      }
      .history-item { padding: 0.75rem 0; font-size: 0.9rem; }
      .history-item .h-time { font-size: 0.82rem; }

      footer { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <!-- Token setup (shown on first run) -->
  <div id="setup">
    <h1>Smart Garage Setup</h1>
    <label for="token-input">API Token</label>
    <input id="token-input" type="password" placeholder="Paste your API token" autocomplete="off" />
    <button id="save-token-btn">Save &amp; Connect</button>
    <div id="setup-error" class="hidden" style="color:#e74c3c;font-size:0.9rem;"></div>
  </div>

  <!-- Home location setup (shown after token setup if geofence not yet configured) -->
  <div id="home-setup" class="hidden">
    <h2>Set Home Location</h2>
    <p>To use the app remotely, set your home location so the trigger is only allowed when you're nearby.</p>
    <label for="radius-input">Radius (metres)</label>
    <input id="radius-input" type="number" value="100" min="10" max="5000" />
    <div class="btn-row">
      <button id="set-home-btn">Use Current Location</button>
      <button class="secondary" id="skip-home-btn">Skip</button>
    </div>
    <div id="home-saved"></div>
  </div>

  <!-- Main UI (hidden until token is set) -->
  <div id="main" class="hidden">
    <h1>GARAGE</h1>
    <div id="status-indicator">...</div>
    <div id="trigger-wrap">
      <button id="trigger-btn">TRIGGER</button>
      <div id="geo-badge" class="hidden-geo">
        <span class="dot"></span>
        <span id="geo-text"></span>
      </div>
    </div>
    <div id="error-msg"></div>
    <button id="logout-btn" style="background:none;border:none;color:#666;font-size:0.8rem;cursor:pointer;margin-top:1rem;">
      Change token
    </button>
    <div id="history-section" class="hidden">
      <h2>Recent Activity</h2>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- Close-door confirmation dialog -->
  <div id="confirm-overlay" class="hidden">
    <div id="confirm-dialog">
      <h2>Close the door?</h2>
      <p>The door is currently open. Make sure no one is under the door before closing.</p>
      <div class="confirm-btns">
        <button id="confirm-cancel-btn">Cancel</button>
        <button id="confirm-close-btn">Close Door</button>
      </div>
    </div>
  </div>

  <footer id="version-footer">Smart Garage</footer>

  <script>
    const POLL_INTERVAL = 5000;
    const GEO_INTERVAL  = 30000;
    let token = localStorage.getItem('garage_token');
    let polling, geoPolling;

    const setupEl    = document.getElementById('setup');
    const homeSetup  = document.getElementById('home-setup');
    const mainEl     = document.getElementById('main');
    const indicator  = document.getElementById('status-indicator');
    const triggerBtn = document.getElementById('trigger-btn');
    const errorMsg   = document.getElementById('error-msg');
    const tokenInput = document.getElementById('token-input');
    const setupError = document.getElementById('setup-error');
    const geoBadge   = document.getElementById('geo-badge');
    const geoText    = document.getElementById('geo-text');

    // --- Geofence helpers ---

    function isLocalNetwork() {
      const h = window.location.hostname;
      return h === 'localhost' || h === '127.0.0.1' || h.endsWith('.local');
    }

    function haversineMetres(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat/2)**2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function getHomeConfig() {
      const lat = parseFloat(localStorage.getItem('home_lat'));
      const lon = parseFloat(localStorage.getItem('home_lon'));
      const radius = parseFloat(localStorage.getItem('home_radius_m')) || 100;
      if (isNaN(lat) || isNaN(lon)) return null;
      return { lat, lon, radius };
    }

    function setGeoBadge(state, text) {
      geoBadge.className = state; // 'in-range' | 'out-range' | 'checking' | 'hidden-geo'
      geoText.textContent = text;
    }

    function updateGeoStatus() {
      if (isLocalNetwork()) { setGeoBadge('hidden-geo', ''); return; }
      const home = getHomeConfig();
      if (!home) { setGeoBadge('hidden-geo', ''); return; }

      setGeoBadge('checking', 'Checking location…');
      navigator.geolocation.getCurrentPosition(
        pos => {
          const dist = Math.round(haversineMetres(
            pos.coords.latitude, pos.coords.longitude, home.lat, home.lon
          ));
          if (dist <= home.radius) {
            setGeoBadge('in-range', `Within ${dist}m of home`);
          } else {
            setGeoBadge('out-range', `${dist}m from home`);
          }
        },
        () => setGeoBadge('out-range', 'Location unavailable'),
        { timeout: 10000, maximumAge: 30000 }
      );
    }

    // Returns a promise: resolves true if allowed, false if blocked
    function checkGeofence() {
      return new Promise(resolve => {
        if (isLocalNetwork()) { resolve(true); return; }
        const home = getHomeConfig();
        if (!home) { resolve(true); return; } // no geofence configured — allow
        navigator.geolocation.getCurrentPosition(
          pos => {
            const dist = Math.round(haversineMetres(
              pos.coords.latitude, pos.coords.longitude, home.lat, home.lon
            ));
            if (dist <= home.radius) {
              resolve(true);
            } else {
              errorMsg.textContent = `Too far from home (${dist}m away).`;
              resolve(false);
            }
          },
          () => {
            errorMsg.textContent = 'Location unavailable — cannot trigger remotely.';
            resolve(false);
          },
          { timeout: 10000, maximumAge: 10000 }
        );
      });
    }

    // --- API ---

    async function apiRequest(path, method = 'GET') {
      const res = await fetch(`/api${path}`, {
        method,
        headers: { Authorization: `Bearer ${token}` },
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    let lastKnownState = null;

    async function refreshStatus() {
      try {
        const data = await apiRequest('/status');
        const state = data.state;
        indicator.textContent = state.toUpperCase();
        indicator.className = state;
        errorMsg.textContent = '';
        if (state !== lastKnownState) {
          lastKnownState = state;
          fetchHistory();
        }
      } catch (e) {
        errorMsg.textContent = 'Could not reach garage server.';
      }
    }

    async function fetchHistory() {
      try {
        const data = await apiRequest('/history?limit=20');
        const list = document.getElementById('history-list');
        const section = document.getElementById('history-section');
        if (data.length === 0) { section.classList.add('hidden'); return; }
        section.classList.remove('hidden');
        list.innerHTML = data.map(e => {
          const d = new Date(e.timestamp.replace(' ', 'T') + 'Z');
          const t = d.toLocaleString([], {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
          let label, stateClass;
          if (e.action === 'trigger') {
            label = `<span class="h-user">${e.user}</span> <span class="h-desc">triggered</span>`;
            stateClass = '';
          } else {
            const src = e.user === 'physical' ? 'physical' : `via ${e.user}`;
            stateClass = e.state;
            label = `<span class="h-desc">Door → </span><span class="h-state ${stateClass}">${e.state.toUpperCase()}</span><span class="h-desc"> (${src})</span>`;
          }
          return `<div class="history-item">
            <div class="h-left">${label}</div>
            <span class="h-time">${t}</span>
          </div>`;
        }).join('');
      } catch (_) {}
    }

    async function doTrigger() {
      triggerBtn.disabled = true;
      indicator.textContent = '...';
      indicator.className = '';
      try {
        await apiRequest('/trigger', 'POST');
        errorMsg.textContent = '';
        fetchHistory();
        let attempts = 0;
        const poll = setInterval(async () => {
          await refreshStatus();
          if (++attempts >= 4) clearInterval(poll);
        }, 2000);
      } catch (e) {
        errorMsg.textContent = 'Trigger failed.';
      } finally {
        triggerBtn.disabled = false;
      }
    }

    async function handleTrigger() {
      errorMsg.textContent = '';
      const allowed = await checkGeofence();
      if (!allowed) return;
      if (lastKnownState === 'open') {
        document.getElementById('confirm-overlay').classList.remove('hidden');
      } else {
        doTrigger();
      }
    }

    function showMain() {
      setupEl.classList.add('hidden');
      homeSetup.classList.add('hidden');
      mainEl.classList.remove('hidden');
      refreshStatus();
      fetchHistory();
      polling = setInterval(refreshStatus, POLL_INTERVAL);
      if (!isLocalNetwork()) {
        updateGeoStatus();
        geoPolling = setInterval(updateGeoStatus, GEO_INTERVAL);
      }
    }

    function showSetup() {
      clearInterval(polling);
      clearInterval(geoPolling);
      mainEl.classList.add('hidden');
      homeSetup.classList.add('hidden');
      setupEl.classList.remove('hidden');
    }

    function showHomeSetup() {
      setupEl.classList.add('hidden');
      homeSetup.classList.remove('hidden');
    }

    // --- Home location setup ---

    document.getElementById('set-home-btn').addEventListener('click', () => {
      const homeSaved = document.getElementById('home-saved');
      homeSaved.textContent = 'Getting location…';
      navigator.geolocation.getCurrentPosition(
        pos => {
          const radius = parseInt(document.getElementById('radius-input').value) || 100;
          localStorage.setItem('home_lat', pos.coords.latitude);
          localStorage.setItem('home_lon', pos.coords.longitude);
          localStorage.setItem('home_radius_m', radius);
          localStorage.setItem('home_setup_done', '1');
          homeSaved.textContent = `Home set · ${radius}m radius`;
          setTimeout(showMain, 800);
        },
        () => {
          homeSaved.style.color = '#e74c3c';
          homeSaved.textContent = 'Could not get location — check browser permissions.';
        },
        { timeout: 10000 }
      );
    });

    document.getElementById('skip-home-btn').addEventListener('click', () => {
      localStorage.setItem('home_setup_done', '1');
      showMain();
    });

    // --- Token setup ---

    document.getElementById('save-token-btn').addEventListener('click', async () => {
      const val = tokenInput.value.trim();
      if (!val) return;
      setupError.classList.add('hidden');
      try {
        const res = await fetch('/api/status', {
          headers: { Authorization: `Bearer ${val}` },
        });
        if (res.status === 401) throw new Error('Invalid token');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        token = val;
        localStorage.setItem('garage_token', token);
        // Prompt home location setup if not yet done and not on local network
        if (!isLocalNetwork() && !localStorage.getItem('home_setup_done')) {
          showHomeSetup();
        } else {
          showMain();
        }
      } catch (e) {
        setupError.textContent = e.message === 'Invalid token' ? 'Invalid token — try again.' : 'Could not connect to server.';
        setupError.classList.remove('hidden');
      }
    });

    triggerBtn.addEventListener('click', handleTrigger);
    document.getElementById('confirm-cancel-btn').addEventListener('click', () => {
      document.getElementById('confirm-overlay').classList.add('hidden');
    });
    document.getElementById('confirm-close-btn').addEventListener('click', () => {
      document.getElementById('confirm-overlay').classList.add('hidden');
      doTrigger();
    });
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('garage_token');
      token = null;
      showSetup();
    });

    // Version footer
    fetch('/api/health').then(r => r.json()).then(d => {
      document.getElementById('version-footer').textContent = `Smart Garage v${d.version}${d.mock ? ' (mock)' : ''}${d.test ? ' (test)' : ''}`;
    }).catch(() => {});

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }

    // Start
    if (token) {
      showMain();
    }
  </script>
</body>
</html>
